name: HCG-TRADER V18 APK Builder

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4  # تم التحديث إلى الإصدار 4

    - name: Setup Python
      uses: actions/setup-python@v4  # تم التحديث إلى الإصدار 4
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        python -m pip install --upgrade pip
        python -m pip install buildozer cython virtualenv


    - name: Initialize Buildozer and Inject Settings
      run: |
        buildozer init
        # حقن الإعدادات آلياً
        sed -i 's/title = My Application/title = HCG TRADER V18/g' buildozer.spec
        sed -i 's/package.name = myapp/package.name = hcgtrader/g' buildozer.spec
        sed -i 's/package.domain = org.test/package.domain = com.emperor.hassan/g' buildozer.spec
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,google-generativeai,pillow,plyer/g' buildozer.spec
        sed -i 's/# android.permissions = INTERNET/android.permissions = INTERNET, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE/g' buildozer.spec
        
    - name: Compile APK
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4  # تم التحديث إلى الإصدار 4 لحل الخطأ
      with:
        name: HCG-TRADER-V18-APK
        path: bin/*.apk
