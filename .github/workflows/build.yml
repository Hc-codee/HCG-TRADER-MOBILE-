name: HCG-TRADER V18 APK Builder

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Create Virtual Environment & Install Buildozer
      run: |
        python -m venv hcg_env
        source hcg_env/bin/activate
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer virtualenv

    - name: Initialize and Inject Settings
      run: |
        source hcg_env/bin/activate
        buildozer init
        # الهندسة الآمنة للإعدادات الأساسية
        sed -i 's/title = My Application/title = HCG TRADER V18/g' buildozer.spec
        sed -i 's/package.name = myapp/package.name = hcgtrader/g' buildozer.spec
        sed -i 's/package.domain = org.test/package.domain = com.emperor.hassan/g' buildozer.spec
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.3.0,google-generativeai,pillow,plyer/g' buildozer.spec
        
        # 🔴 الكسر الجذري: حقن أوامر التراخيص والصلاحيات في نهاية الملف مباشرة
        echo "android.accept_sdk_license = True" >> buildozer.spec
        echo "android.permissions = INTERNET, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE" >> buildozer.spec
        
    - name: Compile APK (The Heavy Lifting)
      run: |
        source hcg_env/bin/activate
        # 🔴 إزالة الـ yes pipe المزعج، الإعدادات المحقونة ستتكفل بالأمر
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: HCG-TRADER-V18-APK
        path: bin/*.apk
        
