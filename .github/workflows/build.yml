name: HCG-TRADER V18 APK Builder

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Create Virtual Environment & Install Buildozer
      run: |
        python -m venv hcg_env
        source hcg_env/bin/activate
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer virtualenv

    - name: Initialize and Inject Settings via Python Core
      run: |
        source hcg_env/bin/activate
        buildozer init
        
        # 🔴 استخدام بايثون لإعادة كتابة إعدادات النواة وتجاوز الإصدارات التجريبية
        python -c "
        import re
        with open('buildozer.spec', 'r') as f: data = f.read()
        
        data = re.sub(r'title = My Application', 'title = HCG TRADER V18', data)
        data = re.sub(r'package.name = myapp', 'package.name = hcgtrader', data)
        data = re.sub(r'package.domain = org.test', 'package.domain = com.emperor.hassan', data)
        data = re.sub(r'requirements = python3,kivy', 'requirements = python3,kivy==2.3.0,google-generativeai,pillow,plyer', data)
        data = re.sub(r'#? ?android.permissions = .*', 'android.permissions = INTERNET, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE', data)
        
        # تفعيل التراخيص بشكل إجباري
        data = re.sub(r'#? ?android.accept_sdk_license = .*', 'android.accept_sdk_license = True', data)
        
        # إجبار النظام على استخدام إصدارات مستقرة لقتل الـ rc2
        data = re.sub(r'#? ?android.api = .*', 'android.api = 34', data)
        data = re.sub(r'#? ?android.minapi = .*', 'android.minapi = 24', data)
        data = re.sub(r'#? ?android.build_tools_version = .*', 'android.build_tools_version = 34.0.0', data)
        
        with open('buildozer.spec', 'w') as f: f.write(data)
        "
        
    - name: Compile APK (The Heavy Lifting)
      run: |
        source hcg_env/bin/activate
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: HCG-TRADER-V18-APK
        path: bin/*.apk
